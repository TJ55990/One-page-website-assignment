<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Page Website</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            text-align: center;
        }

        /* NAV */
        nav {
            background: black;
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* SECTIONS */
        section {
            padding: 50px;
        }

        /* GALLERY */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gallery-img {
            width: 25%;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }

        #lightbox-img {
            display: block;
            margin: auto;
            max-width: 80%;
            margin-top: 50px;
        }

        /* FORM */
        form input, form textarea {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
        }

        /* FOOTER */
        footer {
            background: black;
            color: white;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#video">Video</a>
    <a href="#contact">Contact</a>
</nav>

<!-- HOME -->
<section id="home">
    <h1>Welcome to My Website</h1>
    <p>This is my one-page website which uses images, video, and a contact form.The images pop open in Lightbox format .</p>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Image Gallery</h2>

    <div class="gallery">
        <img src="Images/plant1-small.jpg" onclick="openModal('Images/plant1.jpg')" class="gallery-img">
        <img src="Images/plant2-small.jpg" onclick="openModal('Images/plant2.jpg')" class="gallery-img">
        <img src="Images/plant3-small.jpg" onclick="openModal('Images/plant3.jpg')" class="gallery-img">
        <img src="Images/plant4-small.jpg" onclick="openModal('Images/plant4.jpg')" class="gallery-img">
    </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeModal()">
    <img id="lightbox-img">
</div>

<!-- VIDEO -->
<section id="video">
    <h2>My Video</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/watch?v=4uTv7ZTpnvc"
        frameborder="0" allowfullscreen>
    </iframe>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact Me</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <input type="submit" value="Send">
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 My One Page Website</p>
</footer>

<!-- JS LINK -->
<script src="JS/one_page_website.js"></script>

</body>
</html>
